name: Cross-platform Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: windows-x86_64
          - runner: ubuntu-24.04
            target: linux-x86_64
          - runner: macos-15-intel
            target: macos-x86_64
          - runner: macos-15
            target: macos-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build and verify native bundle
        run: python scripts/build_release.py --output-dir dist --target ${{ matrix.target }}

      - name: Upload native bundle
        uses: actions/upload-artifact@v4
        with:
          name: LaserLab-${{ matrix.target }}
          path: dist/LaserLab-v*-${{ matrix.target }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Download native bundles
        uses: actions/download-artifact@v4
        with:
          pattern: LaserLab-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LaserLab-v*.zip
          generate_release_notes: true
