name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python test suite
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall laserlab gui tests scripts laserlab_launcher.py laserlab_cli_launcher.py main.py

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: GUI smoke
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "from PyQt5.QtWidgets import QApplication; from gui.lab_dashboard import LabDashboardWindow; app = QApplication([]); window = LabDashboardWindow(); assert window.tabs.count() == 9"

      - name: CLI smoke
        run: |
          python -m laserlab.cli --help
          python -m laserlab.cli fixtures list --include-restricted
          python -m laserlab.cli protocols list
          python -m laserlab.cli protocols describe diffraction

      - name: Fixture smoke
        shell: pwsh
        run: |
          python scripts\run_fixture_demo.py --experiment experiments\ci-smoke --max-frames 2 --profile wide --protocol anomaly --blind-seed 12345 --dump-dir release_dumps
          python -m laserlab.cli bundle --experiment experiments\ci-smoke --output release_dumps\ci-smoke-bundle.zip

      - name: Protocol smoke
        shell: pwsh
        run: |
          foreach ($protocol in @("diffraction", "speckle", "ocr", "anomaly")) {
            python scripts\run_fixture_demo.py --experiment "experiments\ci-$protocol" --max-frames 2 --profile wide --protocol $protocol --blind-seed 12345 --dump-dir "release_dumps\$protocol"
          }

      - name: Upload failed-run evidence
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-run-evidence-${{ matrix.python-version }}
          path: |
            experiments/ci-smoke/runs/**/report.html
            experiments/ci-smoke/runs/**/report.json
            experiments/ci-smoke/runs/**/results.json
            experiments/ci-smoke/runs/**/processed/*.png
            experiments/ci-smoke/runs/**/crops/*.png
          if-no-files-found: ignore
